    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f4f7f6; color: #333; overflow-x: hidden; }
        
        .top-bar { background: #004a99; color: white; padding: 8px 5%; display: flex; justify-content: space-between; font-size: 12px; }
        header { background: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid #ff6600; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { height: 50px; width: auto; object-fit: contain; }
        .logo-text { font-size: 22px; font-weight: bold; color: #004a99; }

        .main-container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 15px; align-items: flex-start; }
        aside { width: 260px; flex-shrink: 0; }
        .sidebar-box { background: white; padding: 20px; border-radius: 5px; border: 1px solid #ddd; position: sticky; top: 100px; }
        .cat-item { padding: 10px 0; border-bottom: 1px solid #eee; cursor: pointer; color: #555; list-style: none; transition: 0.2s; }
        .cat-item:hover { color: #ff6600; padding-left: 5px; font-weight: bold; }

        .content-area { flex-grow: 1; width: 100%; }
        .grid-header { background: white; padding: 15px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; width: 100%; }
        
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: #ff6600; }
        .img-container { height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .card-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .card-price { font-size: 20px; color: #004a99; font-weight: bold; margin: 10px 0; }
        
        .enquiry-btn { background: #25d366; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none; font-size: 14px; }
        .enquiry-btn:hover { background: #128c7e; transform: scale(1.02); }

        .banner-row { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; gap: 20px; }
        .small-banners { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .banner-card { border-radius: 8px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .banner-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .social-icon { text-decoration: none; color: white; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; transition: 0.3s; }
        .social-icon:hover { transform: translateY(-3px); opacity: 0.9; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            aside { width: 100%; }
            .sidebar-box { position: static; }
            .top-bar { display: none; }
        }
    </style>
</head>
